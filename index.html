<!DOCTYPE html>
<html>
<head>
<title>Mansour Quiz</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
.container {
    margin-top: 50px;
}
button {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}
.hidden { display: none; }
</style>
</head>

<body>

<div class="container">

<h1>Welcome to My Quiz 🔥</h1>

<div id="start">
<button onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quiz" class="hidden">

<p id="question"></p>

<div id="answers"></div>

<button onclick="next()">Next</button>

</div>

<h2 id="result" class="hidden"></h2>

</div>

<script>

let q = 0;
let score = 0;

const quiz = [
{
q: "Each of the students ______ expected to pass.",
a: ["are","is","were"],
correct: 1
},
{
q: "True or False: English is easy",
a: ["True","False"],
correct: 0
},
{
q: "I ___ a student",
a: ["am","is","are"],
correct: 0
},
{
q: "Choose synonym of big",
a: ["small","large","tiny"],
correct: 1
},
{
q: "Past of go",
a: ["goed","went","gone"],
correct: 1
}
];

function startQuiz(){
document.getElementById("start").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
show();
}

function show(){
let current = quiz[q];
document.getElementById("question").innerText = current.q;

let answersHTML = "";
current.a.forEach((ans,i)=>{
answersHTML += `<button onclick="select(${i})">${ans}</button><br>`;
});

document.getElementById("answers").innerHTML = answersHTML;
}

function select(i){
if(i === quiz[q].correct) score++;
}

function next(){
q++;
if(q < quiz.length){
show();
} else {
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
document.getElementById("result").innerText = "Your Score: " + score + "/5";
}
}

</script>

</body>
</html>
