<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mansour Quiz</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1d4ed8);
    color: white;
    text-align: center;
}

.container {
    max-width: 850px;
    margin: 60px auto;
    padding: 30px;
}

h1 { font-size: 42px; }

.about {
    max-width: 650px;
    margin: 25px auto;
    padding: 20px;
    background: rgba(255,255,255,0.08);
    border-radius: 18px;
}

button {
    padding: 15px 30px;
    margin: 12px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    background: linear-gradient(90deg, #6366f1, #a855f7);
    color: white;
}

.hidden { display: none; }

.progress {
    width: 80%;
    height: 12px;
    background: #334155;
    margin: 25px auto;
    border-radius: 20px;
}

.progress-bar {
    height: 12px;
    width: 0%;
    background: #ec4899;
    border-radius: 20px;
}

.answer-btn {
    display: block;
    width: 70%;
    margin: 12px auto;
    background: #312e81;
    border: 2px solid #a855f7;
}

.selected-answer {
    background: #facc15 !important;
    color: black !important;
}

input {
    padding: 12px;
    width: 60%;
    border-radius: 10px;
    border: none;
}

#feedback {
    margin: 15px auto;
    padding: 10px;
    width: 60%;
    border-radius: 10px;
}

.correct { background: green; }
.wrong { background: red; }

.review-item {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">

<div id="start">
    <h1>Grammar Quiz 🚀</h1>
    <input type="text" id="studentName" placeholder="Enter your name">
    <br>
    <button onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quiz" class="hidden">

    <h2 id="welcomeName"></h2>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <h3 id="qNumber"></h3>
    <p id="question"></p>

    <div id="answers"></div>
    <input type="text" id="textAnswer" class="hidden">

    <div id="feedback" class="hidden"></div>

    <button onclick="next()">Next</button>
</div>

<div id="result" class="hidden"></div>

</div>

<script>

let q = 0;
let score = 0;
let selected = "";
let userName = "";
let userAnswers = [];

const quiz = [
    {type:"mcq", q:"Each of the students ___ expected.", a:["are","is","were"], correct:"is"},
    {type:"truefalse", q:"English is easy", a:["True","False"], correct:"True"},
    {type:"fill", q:"I ___ a student", correct:"am"},
    {type:"short", q:"Past of go?", correct:"went"},
    {type:"short", q:"Synonym of big?", correct:"large"}
];

function startQuiz(){
    userName = document.getElementById("studentName").value.trim();

    if(userName === ""){
        alert("Enter your name");
        return;
    }

    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    document.getElementById("welcomeName").innerText = "Welcome " + userName + " 👋";

    showQuestion();
}

function showQuestion(){
    let current = quiz[q];

    document.getElementById("qNumber").innerText = "Question " + (q+1);
    document.getElementById("question").innerText = current.q;

    document.getElementById("answers").innerHTML = "";
    document.getElementById("textAnswer").classList.add("hidden");
    document.getElementById("textAnswer").value = "";

    selected = "";

    if(current.type === "mcq" || current.type === "truefalse"){
        current.a.forEach(ans=>{
            document.getElementById("answers").innerHTML +=
            `<button class="answer-btn" onclick="selectAnswer(this,'${ans}')">${ans}</button>`;
        });
    } else {
        document.getElementById("textAnswer").classList.remove("hidden");
    }

    updateProgress();
}

function selectAnswer(btn, ans){
    selected = ans;
    document.querySelectorAll(".answer-btn").forEach(b=>b.classList.remove("selected-answer"));
    btn.classList.add("selected-answer");
}

function next(){
    let current = quiz[q];
    let correct = false;
    let answer = "";

    if(current.type === "fill" || current.type === "short"){
        answer = document.getElementById("textAnswer").value.toLowerCase();
        if(answer === "") return alert("Answer first");
        if(answer === current.correct) {score++; correct=true;}
    } else {
        if(selected === "") return alert("Choose answer");
        answer = selected;
        if(selected === current.correct) {score++; correct=true;}
    }

    userAnswers.push({q:current.q, your:answer, correct:current.correct, ok:correct});

    q++;

    if(q < quiz.length){
        showQuestion();
    } else {
        finish();
    }
}

function updateProgress(){
    document.getElementById("progressBar").style.width = ((q+1)/quiz.length*100)+"%";
}

function finish(){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    let review = "";

    userAnswers.forEach((item,i)=>{
        review += `
        <div class="review-item">
        <b>Q${i+1}:</b> ${item.q}<br>
        Your: ${item.your}<br>
        Correct: ${item.correct}<br>
        Result: ${item.ok ? "✔️" : "❌"}
        </div>`;
    });

    document.getElementById("result").innerHTML =
    `<h1>Done 🎉</h1>
    <h2>${userName}</h2>
    <p>Score: ${score}/5</p>
    <h3>Review</h3>
    ${review}
    <button onclick="location.reload()">Try Again</button>`;
}

</script>

</body>
</html>
