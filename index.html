<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mansour Quiz</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1d4ed8);
    color: white;
    text-align: center;
}

.container {
    max-width: 850px;
    margin: 70px auto;
    padding: 30px;
}

h1 {
    font-size: 42px;
}

p {
    font-size: 20px;
}

.about {
    max-width: 650px;
    margin: 30px auto;
    padding: 20px;
    background: rgba(255,255,255,0.08);
    border-radius: 18px;
}

.about h2 {
    color: white;
}

.about p {
    font-size: 15px;
    color: #e5e7eb;
    line-height: 1.6;
}

button {
    padding: 15px 30px;
    margin: 12px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    background: linear-gradient(90deg, #6366f1, #a855f7);
    color: white;
    font-size: 17px;
    font-weight: bold;
}

button:hover {
    transform: scale(1.05);
}

.hidden {
    display: none;
}

.progress {
    width: 80%;
    height: 12px;
    background: #334155;
    margin: 25px auto;
    border-radius: 20px;
}

.progress-bar {
    height: 12px;
    width: 0%;
    background: #ec4899;
    border-radius: 20px;
}

.answer-btn {
    display: block;
    width: 70%;
    margin: 12px auto;
    background: #312e81;
    border: 2px solid #a855f7;
}

.selected-answer {
    background: #facc15 !important;
    color: #111827 !important;
    border: 2px solid white !important;
}

input {
    padding: 15px;
    width: 60%;
    border-radius: 15px;
    border: none;
    font-size: 17px;
    text-align: center;
}

#feedback {
    margin: 20px auto;
    padding: 15px;
    width: 60%;
    border-radius: 15px;
    font-size: 20px;
    font-weight: bold;
}

.correct {
    background: #16a34a;
}

.wrong {
    background: #dc2626;
}

.result-box {
    background: rgba(255,255,255,0.12);
    padding: 30px;
    border-radius: 25px;
}
</style>
</head>

<body>

<div class="container">

    <div id="start">
        <h1>Master English Grammar 🚀</h1>
        <p>Test your knowledge with a smart quiz</p>

        <div class="about">
            <h2>About Me</h2>
            <p>
                Hi, I'm Mansour 👋. This is my personal English quiz website where I test grammar skills in a simple and interactive way.
            </p>
        </div>

        <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <div id="quiz" class="hidden">
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <h2 id="qNumber"></h2>
        <p id="question"></p>

        <div id="answers"></div>

        <input type="text" id="textAnswer" class="hidden" placeholder="Type your answer">

        <div id="feedback" class="hidden"></div>

        <button onclick="next()">Next</button>
    </div>

    <div id="result" class="hidden result-box"></div>

</div>

<script>
let q = 0;
let score = 0;
let selected = "";

const quiz = [
    {
        type: "mcq",
        q: "Each of the students ______ expected to submit their assignment by Friday.",
        a: ["are", "is", "were"],
        correct: "is"
    },
    {
        type: "truefalse",
        q: "True or False: A sentence must always start with a capital letter.",
        a: ["True", "False"],
        correct: "True"
    },
    {
        type: "fill",
        q: "Fill in the blank: I ___ a student.",
        correct: "am"
    },
    {
        type: "short",
        q: "Short answer: What is the past tense of 'go'?",
        correct: "went"
    },
    {
        type: "short",
        q: "Write the synonym of 'big'.",
        correct: "large"
    }
];

function startQuiz() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
}

function showQuestion() {
    let current = quiz[q];

    document.getElementById("qNumber").innerText = "Question " + (q + 1) + " / " + quiz.length;
    document.getElementById("question").innerText = current.q;

    document.getElementById("answers").innerHTML = "";
    document.getElementById("textAnswer").classList.add("hidden");
    document.getElementById("textAnswer").value = "";
    document.getElementById("feedback").classList.add("hidden");

    selected = "";

    if (current.type === "mcq" || current.type === "truefalse") {
        current.a.forEach(function(answer) {
            document.getElementById("answers").innerHTML +=
                `<button class="answer-btn" onclick="selectAnswer(this, '${answer}')">${answer}</button>`;
        });
    } else {
        document.getElementById("textAnswer").classList.remove("hidden");
    }

    updateProgress();
}

function selectAnswer(button, answer) {
    selected = answer;

    let buttons = document.querySelectorAll(".answer-btn");
    buttons.forEach(function(btn) {
        btn.classList.remove("selected-answer");
    });

    button.classList.add("selected-answer");
}

function next() {
    let current = quiz[q];
    let correct = false;

    if (current.type === "fill" || current.type === "short") {
        let userInput = document.getElementById("textAnswer").value.toLowerCase().trim();

        if (userInput === "") {
            alert("Answer first!");
            return;
        }

        if (userInput === current.correct.toLowerCase()) {
            score++;
            correct = true;
        }
    } else {
        if (selected === "") {
            alert("Choose an answer!");
            return;
        }

        if (selected === current.correct) {
            score++;
            correct = true;
        }
    }

    showFeedback(correct);

    setTimeout(function() {
        q++;

        if (q < quiz.length) {
            showQuestion();
        } else {
            finishQuiz();
        }
    }, 900);
}

function showFeedback(correct) {
    let feedback = document.getElementById("feedback");

    feedback.classList.remove("hidden", "correct", "wrong");

    if (correct) {
        feedback.innerText = "Correct ✅";
        feedback.classList.add("correct");
    } else {
        feedback.innerText = "Wrong ❌";
        feedback.classList.add("wrong");
    }
}

function updateProgress() {
    let progress = ((q + 1) / quiz.length) * 100;
    document.getElementById("progressBar").style.width = progress + "%";
}

function finishQuiz() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    document.getElementById("result").innerHTML =
        `<h1>Quiz Completed 🎉</h1>
         <p>Your Score: ${score} / ${quiz.length}</p>
         <button onclick="location.reload()">Try Again</button>`;
}
</script>

</body>
</html>
