<!DOCTYPE html>
<html>
<head>
<title>Mansour Quiz</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1d4ed8);
  color: white;
  text-align: center;
  margin: 0;
}

.container {
  max-width: 850px;
  margin: 70px auto;
  padding: 30px;
}

h1 { font-size: 42px; }

.about {
  max-width: 650px;
  margin: 25px auto;
  padding: 20px;
  background: rgba(255,255,255,0.08);
  border-radius: 18px;
}

button {
  padding: 15px 30px;
  margin: 12px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  background: linear-gradient(90deg,#6366f1,#a855f7);
  color: white;
  font-weight: bold;
}

input {
  padding: 15px;
  width: 60%;
  border-radius: 12px;
  border: none;
  text-align: center;
  font-size: 16px;
}

.hidden { display: none; }

.answer-btn {
  display: block;
  width: 70%;
  margin: 12px auto;
  background: #312e81;
  color: white;
  border: 2px solid #a855f7;
}

.selected {
  background: #facc15 !important;
  color: black !important;
}

.review {
  background: rgba(255,255,255,0.1);
  padding: 12px;
  margin: 12px auto;
  border-radius: 12px;
  max-width: 700px;
}
</style>
</head>

<body>
<div class="container">

<div id="home">
  <h1>Master English Grammar 🚀</h1>
  <p>Test your knowledge with a smart quiz</p>

  <div class="about">
    <h2>About Me</h2>
    <p>
      Hi, I'm Mansour 👋. This is my personal English quiz website where I test grammar skills in a simple and interactive way.
    </p>
  </div>

  <button onclick="showName()">Start Quiz</button>
</div>

<div id="namePage" class="hidden">
  <h1>Before We Start</h1>
  <p>Please enter your name to begin the quiz.</p>
  <input id="name" placeholder="Enter your name">
  <br>
  <button onclick="startQuiz()">Begin</button>
</div>

<div id="quiz" class="hidden">
  <h2 id="welcome"></h2>
  <h3 id="number"></h3>
  <p id="question"></p>

  <div id="answers"></div>
  <input id="textAnswer" class="hidden" placeholder="Type your answer">

  <br>
  <button onclick="next()">Next</button>
</div>

<div id="result" class="hidden"></div>

</div>

<script>
let i = 0;
let score = 0;
let selected = "";
let userName = "";
let review = [];

const quiz = [
  {type:"mcq", q:"Each of the students ___ expected to submit their assignment by Friday.", a:["are","is","were"], correct:"is"},
  {type:"tf", q:"True or False: A sentence must always start with a capital letter.", a:["True","False"], correct:"True"},
  {type:"fill", q:"Fill in the blank: I ___ a student.", correct:"am"},
  {type:"short", q:"What is the past tense of 'go'?", correct:"went"},
  {type:"short", q:"Write the synonym of 'big'.", correct:"large"}
];

function showName(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("namePage").classList.remove("hidden");
}

function startQuiz(){
  userName = document.getElementById("name").value.trim();
  if(userName === "") return alert("Please enter your name");

  document.getElementById("namePage").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  document.getElementById("welcome").innerText = "Welcome, " + userName + " 👋";

  showQuestion();
}

function showQuestion(){
  let current = quiz[i];

  document.getElementById("number").innerText = "Question " + (i+1) + " / " + quiz.length;
  document.getElementById("question").innerText = current.q;
  document.getElementById("answers").innerHTML = "";
  document.getElementById("textAnswer").classList.add("hidden");
  document.getElementById("textAnswer").value = "";
  selected = "";

  if(current.type === "mcq" || current.type === "tf"){
    current.a.forEach(ans => {
      document.getElementById("answers").innerHTML +=
      `<button class="answer-btn" onclick="pick(this,'${ans}')">${ans}</button>`;
    });
  } else {
    document.getElementById("textAnswer").classList.remove("hidden");
  }
}

function pick(btn, ans){
  selected = ans;
  document.querySelectorAll(".answer-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

function next(){
  let current = quiz[i];
  let answer = "";

  if(current.type === "fill" || current.type === "short"){
    answer = document.getElementById("textAnswer").value.toLowerCase().trim();
    if(answer === "") return alert("Answer first");
  } else {
    if(selected === "") return alert("Choose an answer");
    answer = selected;
  }

  let correct = answer.toLowerCase() === current.correct.toLowerCase();
  if(correct) score++;

  review.push({
    question: current.q,
    your: answer,
    correct: current.correct,
    result: correct
  });

  i++;

  if(i < quiz.length){
    showQuestion();
  } else {
    finish();
  }
}

function finish(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let html = `<h1>Quiz Completed 🎉</h1>
              <h2>${userName}</h2>
              <p>Your Score: ${score} / ${quiz.length}</p>
              <h2>Review Your Answers</h2>`;

  review.forEach((r, index) => {
    html += `
    <div class="review">
      <b>Q${index+1}:</b> ${r.question}<br>
      Your answer: ${r.your}<br>
      Correct answer: ${r.correct}<br>
      Result: ${r.result ? "Correct ✅" : "Wrong ❌"}
    </div>`;
  });

  html += `<button onclick="location.reload()">Try Again</button>`;
  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
